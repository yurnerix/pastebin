<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
    <h1>Регистрация</h1>

    <div class="error-box" th:if="${error}">
        <p th:text="${error}">Ошибка регистрации</p>
    </div>

    <form th:action="@{/register}" method="post">
        <label for="username">Имя пользователя</label>
        <input id="username" type="text" name="username" required minlength="3" maxlength="50">

        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>

        <label for="password">Пароль</label>
        <input id="password" type="password" name="password" required minlength="8" maxlength="64">

        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>
        Уже есть аккаунт?
        <a th:href="@{/login}">Войти</a>
    </p>

    <a th:href="@{/}">На главную</a>
</div>
</body>
</html>
