<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="container">
    <h1>Вход</h1>

    <div class="success-box" th:if="${param.registered}">
        <p>Регистрация прошла успешно. Теперь можно войти.</p>
    </div>

    <div class="error-box" th:if="${param.error}">
        <p>Неверный email или пароль.</p>
    </div>

    <form th:action="@{/login}" method="post">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>

        <label for="password">Пароль</label>
        <input id="password" type="password" name="password" required>

        <button type="submit">Войти</button>
    </form>

    <p>
        Нет аккаунта?
        <a th:href="@{/register}">Зарегистрироваться</a>
    </p>

    <a th:href="@{/}">На главную</a>
</div>
</body>
</html>
